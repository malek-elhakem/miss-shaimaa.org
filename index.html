<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shaimaa Platform</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial; background:#1e1e1e; color:white; margin:0; }
header { text-align:center; padding:20px; background: linear-gradient(90deg, #4b6cb7, #182848); }
header h1 { margin:0; color:#fff; }
.container { width: 90%; max-width:400px; margin: 40px auto; }
.card { background:#2c2c2c; padding:20px; margin-bottom:20px; border-radius:10px; text-align:center; }
button { padding:12px 25px; margin:10px; cursor:pointer; border:none; border-radius:5px; background:#4b6cb7; color:white; font-size:16px; }
button:hover { background:#182848; }
#adminCard button { background:#ff6b6b; }
#adminCard button:hover { background:#c0392b; }
.banner { width:100%; height:150px; background: url('banner.jpg') center/cover no-repeat; border-radius:10px; margin-bottom:20px; }
</style>
</head>
<body>

<header>
<h1>Shaimaa Platform</h1>
</header>

<section class="container">

<div class="banner"></div>

<div class="card">
<h2>User Actions</h2>
<button onclick="location.href='login.html'">Login</button>
<button onclick="location.href='register.html'">Register</button>
</div>

<div class="card" id="adminCard" style="display:none;">
<h2>Admin Panel</h2>
<button onclick="location.href='admin_panel.html'">Go to Admin Panel</button>
</div>

</section>

<footer style="text-align:center; padding:10px; color:#aaa;">
<p>© Shaimaa El-Desouky Platform</p>
</footer>

<script>
// Check if logged in
let currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
const admin = { username: "sd" };

// Show admin card if admin logged in
if(currentStudent && currentStudent.number === admin.username){
    document.getElementById('adminCard').style.display = 'block';
}
</script>

</body>
</html>
