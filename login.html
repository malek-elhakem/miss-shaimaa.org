<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Login</h1></header>

<section class="container">
<div class="card">
<h2>Enter Your Credentials</h2>
<form id="loginForm">
<input type="text" id="username" placeholder="Username or Student Number" required><br>
<input type="password" id="password" placeholder="Password" required><br>
<button type="submit">Login</button>
<p id="error" style="color:red;"></p>
</form>
</div>
</section>

<footer>
<p>© Shaimaa El-Desouky Platform</p>
</footer>

<script>
// Dummy Student Accounts
const students = [
    { number: "1001", name:"Ali Ahmed", password: "pass1", grade: "1 Preparatory", exams: {} },
    { number: "1002", name:"Sara Mohamed", password: "pass2", grade: "2 Preparatory", exams: {} }
];

const admin = { username: "sd", password: "1234" };

// Save initial data to localStorage if empty
if(!localStorage.getItem('studentsData')){
    localStorage.setItem('studentsData', JSON.stringify(students));
}

const form = document.getElementById('loginForm');
form.addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // Check Admin
    if(user === admin.username && pass === admin.password){
        window.location.href = "admin_panel.html";
        return;
    }

    // Check Students
    const allStudents = JSON.parse(localStorage.getItem('studentsData'));
    const found = allStudents.find(s => s.number === user && s.password === pass);
    if(found){
        localStorage.setItem('currentStudent', JSON.stringify(found));
        window.location.href = "student_dashboard.html";
        return;
    }

    document.getElementById('error').innerText = "Wrong Username or Password!";
});
</script>

</body>
</html>
