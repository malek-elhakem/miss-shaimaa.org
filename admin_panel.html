<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Admin Panel</h1></header>

<section class="container">

<div class="card">
<h2>Upload Exams</h2>
<form id="examForm">
<label>Grade</label>
<select id="examGrade" required>
<option value="">Select Grade</option>
<option>1 Preparatory</option>
<option>2 Preparatory</option>
<option>3 Preparatory</option>
<option>1 Secondary</option>
</select><br>
<label>Year</label>
<input type="text" id="examYear" placeholder="e.g. 2025" required><br>
<label>Exam Name</label>
<input type="text" id="examName" placeholder="e.g. Arabic" required><br>
<label>Upload Exam (PDF)</label>
<input type="file" id="examFile" accept=".pdf" required><br>
<button type="submit">Upload Exam</button>
</form>
</div>

<div class="card">
<h2>Search Students</h2>
<input type="text" id="searchInput" placeholder="Enter student number or name">
<table border="1" style="width:100%;color:white;">
  <thead>
    <tr>
      <th>Number</th>
      <th>Name</th>
      <th>Grade</th>
      <th>Mandatory Exam</th>
      <th>Arabic</th>
      <th>Other Exams</th>
    </tr>
  </thead>
  <tbody id="studentsTableBody"></tbody>
</table>
</div>

</section>

<footer>
<p>© Shaimaa El-Desouky Platform</p>
</footer>

<script>
// Load students
let allStudents = JSON.parse(localStorage.getItem('studentsData')) || [];

function renderTable(filter=""){
    const tbody = document.getElementById('studentsTableBody');
    tbody.innerHTML = "";
    allStudents.forEach(s => {
        if(filter && !s.number.includes(filter) && !s.name.toLowerCase().includes(filter.toLowerCase())) return;
        const row = `<tr>
            <td>${s.number}</td>
            <td>${s.name}</td>
            <td>${s.grade}</td>
            <td>${s.exams?.Mandatory?.score ?? 'Not Taken'}</td>
            <td>${s.exams?.Arabic?.score ?? 'Not Taken'}</td>
            <td>${JSON.stringify(s.exams)}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
renderTable();

// Search students
document.getElementById('searchInput').addEventListener('input', function(){
    renderTable(this.value);
});

// Upload exam (dummy, just alert)
document.getElementById('examForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert("Exam uploaded successfully!");
});
</script>

</body>
</html>
