<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header><h1>Student Dashboard</h1></header>

<section class="container">

<div class="card">
<h2>Your Exams & Grades</h2>
<ul id="examList"></ul>
<button onclick="generatePDF()">Download Grades PDF</button>
</div>

<div class="card">
<h2>All Available Files</h2>
<ul id="allFilesList"></ul>
</div>

</section>

<footer>
<p>© Shaimaa El-Desouky Platform</p>
</footer>

<script>
let currentStudent = JSON.parse(localStorage.getItem('currentStudent'));
let allStudents = JSON.parse(localStorage.getItem('studentsData')) || [];

// Display exams for this student
let examList = document.getElementById('examList');
for(let exam in currentStudent.exams){
  let score = currentStudent.exams[exam]?.score ?? "Not Taken";
  let li = document.createElement('li');
  li.textContent = `${exam}: ${score}`;
  examList.appendChild(li);
}

// Display all files (dummy example)
let allFilesList = document.getElementById('allFilesList');
let files = [
  "Arabic_1Preparatory_2025.pdf",
  "Math_2Preparatory_2025.pdf",
  "English_3Preparatory_2025.pdf",
  "Physics_1Secondary_2025.pdf"
];
files.forEach(f=>{
  let li = document.createElement('li');
  li.innerHTML = `<a href="files/${f}" target="_blank">${f}</a>`;
  allFilesList.appendChild(li);
});

// PDF Generator
function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text(`Grades for ${currentStudent.name}`, 20, 20);
  let y = 30;
  for(let exam in currentStudent.exams){
    let score = currentStudent.exams[exam]?.score ?? "Not Taken";
    doc.text(`${exam}: ${score}`, 20, y);
    y += 10;
  }
  doc.save(`${currentStudent.number}_grades.pdf`);
}
</script>

</body>
</html>
